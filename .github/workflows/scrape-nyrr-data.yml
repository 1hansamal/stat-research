name: Scrape NYRR Marathon Data

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'data/get-nyrr-data.R'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    # GitHub's hard cap on a job is 360 minutes, this just guards against a hang
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.1'
          use-public-rspm: true

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr
            any::jsonlite
            any::data.table
            any::xml2

      - name: Run scraper
        run: Rscript data/get-nyrr-data.R

      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csv data/log
          git diff --cached --quiet || git commit -m "Update NYRR data [skip ci]"
          git push
